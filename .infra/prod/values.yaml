stack:
  services:
    frontend:
      image:
        tag: sha-c3a8ace
      replicaCount: 2
      env:
        - name: API_URL_V2
          value: https://graphql.cryoetdataportal.czscience.com/graphql
        - name: ENV
          value: prod
      resources:
        limits:
          cpu: "1"
          memory: 4Gi
        requests:
          cpu: 100m
          memory: 512Mi
      livenessProbe:
        httpGet:
          path: /healthz
